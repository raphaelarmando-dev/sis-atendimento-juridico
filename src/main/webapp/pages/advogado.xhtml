<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets">

    <ui:composition template="/WEB-INF/templates/template.xhtml">

        <ui:define name="titulo">Gestão de Advogados</ui:define>

        <ui:define name="conteudo">
            <h:form id="formAdvogado">

                <p:toolbar style="border:none; background:none; margin-bottom:10px;">
                    <p:toolbarGroup>
                        <p:commandButton value="Novo Advogado"
                                         icon="pi pi-plus"
                                         styleClass="btn-novo"
                                         process="@this"
                                         actionListener="#{advogadoBean.novo}"
                                         update=":formAdvogado:panelAdvogado"
                                         oncomplete="PF('dlgAdvogado').show()" />
                    </p:toolbarGroup>
                </p:toolbar>

                <p:dataTable id="tabelaAdvogados"
                             value="#{advogadoBean.advogados}"
                             var="advogado"
                             emptyMessage="Nenhum advogado cadastrado."
                             style="margin-top: 10px;">

                    <p:column headerText="ID"><h:outputText value="#{advogado.id}" /></p:column>
                    <p:column headerText="Nome"><h:outputText value="#{advogado.nome}" /></p:column>
                    <p:column headerText="OAB"><h:outputText value="#{advogado.oab}" /></p:column>
                    <p:column headerText="CPF"><h:outputText value="#{advogado.cpf}" /></p:column>
                    <p:column headerText="E-mail"><h:outputText value="#{advogado.email}" /></p:column>
                    <p:column headerText="Telefone"><h:outputText value="#{advogado.telefone}" /></p:column>

                    <p:column headerText="Ações" styleClass="coluna-acoes">
                        <p:commandButton icon="pi pi-pencil"
                                         styleClass="btn-tabela"
                                         process="@this"
                                         actionListener="#{advogadoBean.editar(advogado)}"
                                         update=":formAdvogado:panelAdvogado"
                                         oncomplete="PF('dlgAdvogado').show()" />

                        <p:commandButton icon="pi pi-trash"
                                         styleClass="btn-tabela"
                                         actionListener="#{advogadoBean.remover(advogado)}"
                                         update=":formAdvogado:tabelaAdvogados :formAdvogado:msgs"
                                         process="@this"
                                         style="margin-left: 5px;">
                            <p:confirm header="Confirmação"
                                       message="Deseja realmente excluir este advogado?"
                                       icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                    </p:column>
                </p:dataTable>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                    <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                    <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times" />
                </p:confirmDialog>

                <p:dialog id="dlgAdvogado" header="Dados do Advogado" widgetVar="dlgAdvogado" modal="true" resizable="false" width="500">
                    <h:panelGroup id="panelAdvogado" layout="block" style="padding: 10px;">
                        <p:panelGrid columns="2" style="width: 100%" styleClass="ui-panelgrid-blank">
                            <p:outputLabel value="Nome:" for="nome" style="font-weight:bold;" />
                            <p:inputText id="nome" value="#{advogadoBean.advogado.nome}" required="true" style="width: 100%" />

                            <p:outputLabel value="OAB:" for="oab" style="font-weight:bold;" />
                            <p:inputText id="oab" value="#{advogadoBean.advogado.oab}" required="true" style="width: 100%" />

                            <p:outputLabel value="CPF:" for="cpf" style="font-weight:bold;" />
                            <p:inputMask id="cpf" value="#{advogadoBean.advogado.cpf}" mask="999.999.999-99" required="true" style="width: 100%" />

                            <p:outputLabel value="E-mail:" for="email" style="font-weight:bold;" />
                            <p:inputText id="email" value="#{advogadoBean.advogado.email}" style="width: 100%" />

                            <p:outputLabel value="Telefone:" for="telefone" style="font-weight:bold;" />
                            <p:inputText id="telefone" value="#{advogadoBean.advogado.telefone}" style="width: 100%" />
                        </p:panelGrid>
                    </h:panelGroup>

                    <f:facet name="footer">
                        <p:commandButton value="Salvar" icon="pi pi-check"
                                         action="#{advogadoBean.salvar}"
                                         update=":formAdvogado:tabelaAdvogados :formAdvogado:msgs :formAdvogado:panelAdvogado"
                                         oncomplete="if (!args.validationFailed) PF('dlgAdvogado').hide()" />
                        <p:commandButton value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgAdvogado').hide()"
                                         type="button" style="margin-left: 5px" />
                    </f:facet>
                </p:dialog>

                <p:growl id="msgs" showDetail="true" />
            </h:form>
        </ui:define>
    </ui:composition>
</html>
